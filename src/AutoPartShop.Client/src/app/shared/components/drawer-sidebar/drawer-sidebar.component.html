<!-- Desktop Sidebar (Persistent) -->
<div
  class="sidebar-desktop hidden lg:flex flex-col h-full overflow-hidden bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-700"
  style="width: 280px"
>
  <!-- Sidebar Menu -->
  <div class="flex-1 overflow-y-auto">
    <p-menu [model]="menuItems()" d [styleClass]="'w-full border-none'" class="sidebar-menu">
    </p-menu>
  </div>
</div>

<!-- Mobile Drawer (Modal) -->
<p-drawer
  [(visible)]="sidebarVisible"
  [modal]="true"
  [showCloseIcon]="true"
  position="left"
  [style]="{ width: '280px' }"
  styleClass="drawer-container lg:hidden"
  [baseZIndex]="1000"
>
  <ng-template pTemplate="header">
    <div class="flex items-center gap-2">
      <i class="pi pi-truck text-2xl text-blue-600"></i>
      <span class="font-bold text-gray-800 dark:text-white">AutoParts</span>
    </div>
  </ng-template>

  <!-- Drawer Menu -->
  <p-menu [model]="menuItems()" [styleClass]="'w-full border-none'" class="drawer-menu"> </p-menu>
</p-drawer>

<!-- Mobile Menu Toggle Button (visible only on mobile) -->
<button
  pButton
  type="button"
  icon="pi pi-bars"
  class="p-button-rounded p-button-text lg:hidden absolute top-16 left-4 z-30"
  (click)="toggleSidebar()"
></button>
