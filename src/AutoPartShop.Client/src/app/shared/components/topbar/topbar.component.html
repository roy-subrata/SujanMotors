<div class="topbar-wrapper">
  <p-toolbar class="topbar-main">
    <!-- Left: Logo -->
    <ng-template pTemplate="left">
      <div class="flex items-center gap-2">
        <i class="pi pi-truck text-2xl text-blue-600"></i>
        <h1 class="text-lg font-bold text-gray-800 dark:text-white hidden sm:block">
          AutoPartShop
        </h1>
      </div>
    </ng-template>

    <!-- Center: Main Navigation Menu (visible on large screens) -->
    <ng-template pTemplate="center">
      <div class="hidden lg:flex">
        <p-menu [model]="items()" [popup]="false" orientation="horizontal" class="topbar-menu">
        </p-menu>
      </div>
    </ng-template>

    <!-- Right: Search, Notifications, User Menu -->
    <ng-template pTemplate="right">
      <div class="flex items-center gap-2 mr-2">
        <!-- Search (hidden on mobile) -->
        <div class="hidden md:flex items-center">
          <input
            type="text"
            placeholder="Search..."
            class="px-3 py-1.5 rounded-lg border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
          />
        </div>

        <!-- Notification Bell -->
        <button
          pButton
          type="button"
          icon="pi pi-bell"
          class="p-button-rounded p-button-text p-button-plain"
          pBadge
          [value]="'5'"
          badgeClass="p-badge-danger p-badge-overlap"
        ></button>

        <!-- User Menu -->
        <p-menu #userMenu [model]="userMenuItems()" [popup]="true" appendTo="body"> </p-menu>
        <button
          pButton
          type="button"
          icon="pi pi-user"
          class="p-button-rounded p-button-text p-button-plain"
          (click)="userMenu.toggle($event)"
        ></button>
      </div>
    </ng-template>
  </p-toolbar>
</div>
