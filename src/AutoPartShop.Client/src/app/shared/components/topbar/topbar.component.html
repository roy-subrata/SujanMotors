<!-- Header -->
<header class="sticky top-0 z-40 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 shadow-sm">
  <div class="px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Left Section: Logo and Brand -->
      <div class="flex items-center gap-4 flex-1">
        <!-- Hamburger Menu Button -->
        <button
          type="button"
          (click)="toggleDrawer()"
          class="flex items-center justify-center w-14 h-14 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
          [title]="'Menu'">
          <svg class="w-7 h-7 text-gray-800 dark:text-gray-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 6h16M4 12h16M4 18h16"></path>
          </svg>
        </button>

        <div class="flex items-center gap-2">
          <div class="flex items-center justify-center w-10 h-10 rounded-lg bg-blue-600 dark:bg-blue-500 shadow-md">
            <i class="pi pi-shopping-bag text-white text-lg"></i>
          </div>
          <div class="hidden sm:block">
            <h1 class="text-lg font-bold text-gray-900 dark:text-white tracking-tight">AutoPartShop</h1>
            <p class="text-xs text-gray-500 dark:text-gray-400">Inventory Management</p>
          </div>
        </div>
      </div>

      <!-- Right Section: User Menu and Profile -->
      <div class="flex items-center gap-2 sm:gap-4">
        <!-- Notification Bell -->
        <button
          type="button"
          class="relative flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors duration-200"
          [title]="'Notifications'">
          <svg class="w-6 h-6 text-gray-800 dark:text-gray-100" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span class="absolute top-1 right-1 inline-flex items-center justify-center px-1.5 py-0.5 text-xs font-bold text-white bg-red-600 rounded-full min-w-[18px]">3</span>
        </button>

        <!-- Divider -->
        <div class="hidden sm:block w-px h-6 bg-gray-200 dark:bg-gray-700"></div>

        <!-- User Profile Dropdown -->
        <button
          #userMenuBtn
          pButton
          type="button"
          class="p-button-rounded p-button-text flex items-center gap-2 px-2 py-1 hover:bg-gray-100 dark:hover:bg-gray-700"
          (click)="userMenu.toggle($event)"
          pRipple>
          <p-avatar
            image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png"
            shape="circle"
            size="normal"
            styleClass="w-8 h-8">
          </p-avatar>
          <span class="hidden sm:inline text-sm font-medium text-gray-700 dark:text-gray-300">John Doe</span>
          <i class="pi pi-chevron-down text-xs text-gray-500 dark:text-gray-400 hidden sm:inline"></i>
        </button>

        <p-menu
          #userMenu
          [model]="userMenuItems"
          [popup]="true"
          appendTo="body"
          styleClass="dark:bg-gray-800">
        </p-menu>
      </div>
    </div>
  </div>
</header>
