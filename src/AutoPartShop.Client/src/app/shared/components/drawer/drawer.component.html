<!-- Drawer Overlay (Mobile) -->
<div
  *ngIf="isOpen()"
  class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden transition-opacity duration-300"
  (click)="toggleDrawer()">
</div>

<!-- Drawer/Sidebar -->
<aside
  [class.drawer-open]="isOpen()"
  [class.drawer-collapsed]="isCollapsed()"
  class="fixed left-0 top-16 h-[calc(100vh-64px)] z-40 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 shadow-lg transition-all duration-300">

  <!-- Drawer Container -->
  <div class="flex flex-col h-full">
    <!-- Close Button (Mobile Only) -->
    <button
      (click)="toggleDrawer()"
      class="lg:hidden absolute top-4 right-4 p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg">
      <i class="pi pi-times text-gray-600 dark:text-gray-300 text-lg"></i>
    </button>

    <!-- Navigation Content -->
    <nav class="flex-1 overflow-y-auto pt-4">
      <div class="space-y-2 px-3">
        <!-- Menu Items -->
        <div *ngFor="let item of menuItems" class="menu-section">
          <!-- Simple Menu Item (No Children) -->
          <a
            *ngIf="!item.children"
            [routerLink]="item.path"
            (click)="onLinkClick()"
            class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
            [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
            [title]="item.label">
            <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
            <span class="menu-label font-medium">{{ item.label }}</span>
          </a>

          <!-- Parent Menu Item with Children -->
          <button
            *ngIf="item.children"
            (click)="toggleMenu(item)"
            class="w-full flex items-center justify-between gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
            [title]="item.label">
            <div class="flex items-center gap-3 flex-1">
              <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
              <span class="menu-label font-medium">{{ item.label }}</span>
            </div>
            <i
              [class]="'pi pi-chevron-down text-xs flex-shrink-0 transition-transform duration-200 ' + (item.expanded ? 'rotate-180' : '')"
              [style]="{'margin-left': '0.5rem'}">
            </i>
          </button>

          <!-- Submenu Items -->
          <div
            *ngIf="item.children && item.expanded"
            class="ml-8 space-y-2 border-l border-gray-200 dark:border-gray-700 pl-0">
            <a
              *ngFor="let child of item.children"
              [routerLink]="child.path"
              (click)="onLinkClick()"
              class="flex items-center gap-3 px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-gray-200 rounded-lg transition-colors duration-200"
              [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
              [title]="child.label">
              <i [class]="'pi ' + child.icon + ' text-base flex-shrink-0'"></i>
              <span class="menu-label">{{ child.label }}</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Bottom Section (Optional - for future use) -->
    <div class="border-t border-gray-200 dark:border-gray-700 p-3">
      <button class="w-full flex items-center gap-3 px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200">
        <i class="pi pi-question-circle text-lg flex-shrink-0"></i>
        <span class="menu-label text-sm">Help</span>
      </button>
    </div>
  </div>
</aside>
