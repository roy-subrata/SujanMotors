<!-- Sidebar Navigation -->
<aside
  [class.collapsed]="isCollapsed()"
  class="fixed left-0 top-16 h-[calc(100vh-64px)] w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 overflow-y-auto transition-all duration-300 z-30">

  <!-- Sidebar Header with Toggle -->

  <!-- Navigation Menu -->
  <nav class="p-3 space-y-1">
    <div *ngFor="let item of menuItems" class="menu-section">
      <!-- Simple Menu Item (No Children) -->
      <a
        *ngIf="!item.children"
        [routerLink]="item.path"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors"
        [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
        [title]="item.label">
        <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
        <span class="menu-label font-medium text-sm">{{ item.label }}</span>
      </a>

      <!-- Parent Menu Item with Children -->
      <button
        *ngIf="item.children"
        (click)="toggleMenu(item)"
        class="w-full flex items-center justify-between gap-2 px-3 py-2 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 transition-colors border-none bg-transparent cursor-pointer"
        [title]="item.label">
        <div class="flex items-center gap-3 flex-1">
          <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
          <span class="menu-label font-medium text-sm">{{ item.label }}</span>
        </div>
        <i
          [class]="'pi pi-chevron-down text-xs flex-shrink-0 transition-transform duration-200 ' + (item.expanded ? 'rotate-180' : '')"
          class="menu-label">
        </i>
      </button>

      <!-- Submenu Items -->
      <div
        *ngIf="item.children && item.expanded"
        class="ml-6 mt-1 space-y-1 border-l border-gray-200 dark:border-gray-700 pl-3">
        <a
          *ngFor="let child of item.children"
          [routerLink]="child.path"
          class="flex items-center gap-3 px-3 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-gray-200 rounded-lg transition-colors"
          [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
          [title]="child.label">
          <i [class]="'pi ' + child.icon + ' text-base flex-shrink-0'"></i>
          <span class="menu-label text-sm">{{ child.label }}</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Sidebar Footer -->
  <div class="absolute bottom-0 left-0 right-0 border-t border-gray-200 dark:border-gray-700 p-3">
    <button
      class="w-full flex items-center gap-3 px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors border-none bg-transparent cursor-pointer">
      <i class="pi pi-question-circle text-lg flex-shrink-0"></i>
      <span class="menu-label text-sm">Help</span>
    </button>
  </div>
</aside>
