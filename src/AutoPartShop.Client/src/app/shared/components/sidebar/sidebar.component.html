<!-- PrimeNG Drawer Component -->
<p-drawer
  [(visible)]="isDrawerOpen"
  [modal]="true"
  [showCloseIcon]="true"
  position="left"
  [style]="{'width': '280px'}"
  styleClass="p-drawer-custom"
  (visibleChange)="isDrawerOpen.set($event)">

  <!-- Drawer Header -->
  <ng-template pTemplate="header">
    <div class="flex items-center gap-2">
      <div class="flex items-center justify-center w-8 h-8 rounded-lg bg-blue-600 dark:bg-blue-500">
        <i class="pi pi-shopping-bag text-white text-sm"></i>
      </div>
      <h2 class="text-lg font-bold text-gray-900 dark:text-white">AutoPartShop</h2>
    </div>
  </ng-template>

  <!-- Drawer Content - Navigation Menu -->
  <div class="flex flex-col h-full overflow-hidden">
    <nav class="flex-1 overflow-y-auto pt-2">
      <div class="space-y-2 px-2">
        <!-- Menu Items -->
        <div *ngFor="let item of menuItems" class="menu-section">
          <!-- Simple Menu Item (No Children) -->
          <a
            *ngIf="!item.children"
            [routerLink]="item.path"
            (click)="closeDrawer()"
            class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200"
            [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
            [title]="item.label">
            <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
            <span class="menu-label font-medium">{{ item.label }}</span>
          </a>

          <!-- Parent Menu Item with Children -->
          <button
            *ngIf="item.children"
            (click)="toggleMenu(item)"
            class="w-full flex items-center justify-between gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200 border-none bg-transparent cursor-pointer"
            [title]="item.label">
            <div class="flex items-center gap-3 flex-1">
              <i [class]="'pi ' + item.icon + ' text-lg flex-shrink-0'"></i>
              <span class="menu-label font-medium">{{ item.label }}</span>
            </div>
            <i
              [class]="'pi pi-chevron-down text-xs flex-shrink-0 transition-transform duration-200 ' + (item.expanded ? 'rotate-180' : '')"
              [style]="{'margin-left': '0.5rem'}">
            </i>
          </button>

          <!-- Submenu Items -->
          <div
            *ngIf="item.children && item.expanded"
            class="ml-8 space-y-2 border-l border-gray-200 dark:border-gray-700 pl-0">
            <a
              *ngFor="let child of item.children"
              [routerLink]="child.path"
              (click)="closeDrawer()"
              class="flex items-center gap-3 px-4 py-2 text-sm text-gray-600 dark:text-gray-400 hover:bg-blue-50 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-gray-200 rounded-lg transition-colors duration-200"
              [routerLinkActive]="'bg-blue-100 dark:bg-gray-700 text-blue-600 dark:text-blue-400'"
              [title]="child.label">
              <i [class]="'pi ' + child.icon + ' text-base flex-shrink-0'"></i>
              <span class="menu-label">{{ child.label }}</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Drawer Footer -->
    <div class="border-t border-gray-200 dark:border-gray-700 p-3">
      <button
        class="w-full flex items-center gap-3 px-4 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors duration-200 border-none bg-transparent cursor-pointer">
        <i class="pi pi-question-circle text-lg flex-shrink-0"></i>
        <span class="menu-label text-sm">Help</span>
      </button>
    </div>
  </div>
</p-drawer>
