<!-- ============================================================
     PURCHASE ORDERS LIST - PRODUCTION-READY ENTERPRISE UI
     ============================================================ -->

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>
<p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>

<app-page-container>
  <!-- ==================== PAGE HEADER ==================== -->
  <app-page-header
    title="Purchase Orders"
    subtitle="Manage and track your purchase orders"
    [count]="totalRecords" countLabel="orders">
    <ng-container actions>
      <button class="btn-icon" pTooltip="Refresh" tooltipPosition="bottom" (click)="loadPurchaseOrders(currentPage, rows, searchTerm)">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button class="btn-icon" pTooltip="More options" tooltipPosition="bottom" (click)="menu.toggle($event)">
        <i class="pi pi-ellipsis-v"></i>
      </button>
      <button *appHasRole="['Admin','Manager']" class="btn-primary" (click)="onCreateClick()">
        <i class="pi pi-plus"></i>
        <span>New Order</span>
      </button>
    </ng-container>
  </app-page-header>

  <!-- ==================== FILTER SECTION ==================== -->
  <section class="filter-section">
    <div class="filter-container">
      <div class="filter-group search-group">
        <div class="search-input-wrapper">
          <i class="pi pi-search"></i>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Search by PO number, supplier..."
            (keyup.enter)="onSearch()"
            class="search-input" />
          <button *ngIf="searchTerm" class="search-clear" (click)="clearSearch()">
            <i class="pi pi-times"></i>
          </button>
        </div>
      </div>

      <div class="filter-group">
        <p-select
          [options]="statusOptions"
          [(ngModel)]="filterStatus"
          placeholder="All Statuses"
          [showClear]="true"
          (onChange)="onFilterChange()"
          appendTo="body"
          styleClass="filter-dropdown">
        </p-select>
      </div>

      <div class="filter-group">
        <p-datepicker
          [(ngModel)]="dateRange"
          selectionMode="range"
          placeholder="Select date range"
          dateFormat="dd M yy"
          [showIcon]="true"
          [showButtonBar]="true"
          (onSelect)="onFilterChange()"
          appendTo="body"
          styleClass="filter-datepicker">
        </p-datepicker>
      </div>

      <div class="filter-group filter-actions">
        <button class="btn-search" (click)="onSearch()">
          <i class="pi pi-search"></i>
          Search
        </button>
        <button *ngIf="hasActiveFilters()" class="btn-clear" (click)="clearFilters()">
          <i class="pi pi-filter-slash"></i>
          Clear
        </button>
      </div>
    </div>

    <div *ngIf="hasActiveFilters()" class="active-filters">
      <span class="active-filters-label">Active filters:</span>
      <span *ngIf="searchTerm" class="filter-chip">
        Search: "{{ searchTerm }}"
        <i class="pi pi-times" (click)="clearSearch()"></i>
      </span>
      <span *ngIf="filterStatus" class="filter-chip">
        Status: {{ filterStatus }}
        <i class="pi pi-times" (click)="filterStatus = null; onFilterChange()"></i>
      </span>
      <span *ngIf="dateRange && dateRange.length > 0" class="filter-chip">
        Date Range
        <i class="pi pi-times" (click)="dateRange = null; onFilterChange()"></i>
      </span>
    </div>
  </section>

  <!-- ==================== TABLE + CARDS ==================== -->
  <section class="table-section">
    <app-purchase-orders-list
      [purchaseOrders]="purchaseOrders"
      [loading]="loading"
      [totalRecords]="totalRecords"
      [rows]="rows"
      [currentPage]="currentPage"
      [searchTerm]="searchTerm"
      (editClick)="onEditClick($event)"
      (pageChange)="onPageChange($event)"
      (poDeleted)="onPurchaseOrderDeleted()">
    </app-purchase-orders-list>
  </section>
</app-page-container>

<!-- Create/Edit Dialogs -->
<app-purchase-orders-form-dialog
  [(visible)]="displayCreateDialog"
  [purchaseOrder]="null"
  (submitted)="onPurchaseOrderCreated($any($event))">
</app-purchase-orders-form-dialog>

<app-purchase-orders-form-dialog
  [(visible)]="displayUpdateDialog"
  [purchaseOrder]="selectedPurchaseOrder"
  (submitted)="onPurchaseOrderUpdated($any($event))">
</app-purchase-orders-form-dialog>
