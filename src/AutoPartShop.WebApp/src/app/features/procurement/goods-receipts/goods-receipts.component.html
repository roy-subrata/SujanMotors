<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-page-container>
  <!-- ==================== PAGE HEADER ==================== -->
  <app-page-header
    title="Goods Receipts"
    subtitle="Record and track incoming inventory from suppliers"
    [count]="totalRecords" countLabel="receipts">
    <ng-container actions>
      <button class="btn-icon" pTooltip="Refresh" tooltipPosition="bottom" (click)="refreshData()">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button class="btn-icon" pTooltip="Export CSV" tooltipPosition="bottom" (click)="exportReceipts('csv')">
        <i class="pi pi-file"></i>
      </button>
      <button class="btn-icon" pTooltip="Export JSON" tooltipPosition="bottom" (click)="exportReceipts('json')">
        <i class="pi pi-file-export"></i>
      </button>
      <button *appHasRole="['Admin','Manager']" class="btn-primary" (click)="onCreateClick()">
        <i class="pi pi-plus"></i>
        <span>New Receipt</span>
      </button>
    </ng-container>
  </app-page-header>

  <!-- ==================== FILTER SECTION ==================== -->
  <app-filter-bar>
    <div search class="filter-group search-group">
      <div class="search-input-wrapper">
        <i class="pi pi-search"></i>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Search by GRN number, PO number, warehouse..."
          (keyup.enter)="onSearch()"
          class="search-input" />
        <button *ngIf="searchTerm" class="search-clear" (click)="searchTerm = ''; onSearch()">
          <i class="pi pi-times"></i>
        </button>
      </div>
    </div>

    <div filters class="filter-group">
      <p-select
        [options]="statusOptions"
        [(ngModel)]="filterStatus"
        placeholder="All Statuses"
        [showClear]="true"
        (onChange)="onFilterChange()"
        appendTo="body"
        styleClass="filter-dropdown">
      </p-select>
    </div>

    <div filters class="filter-group">
      <p-datepicker
        [(ngModel)]="dateRange"
        selectionMode="range"
        placeholder="Select date range"
        dateFormat="dd M yy"
        [showIcon]="true"
        [showButtonBar]="true"
        (onSelect)="onFilterChange()"
        appendTo="body"
        styleClass="filter-datepicker">
      </p-datepicker>
    </div>

    <div filterActions class="filter-group filter-actions">
      <button class="btn-search" (click)="onSearch()">
        <i class="pi pi-search"></i>
        Search
      </button>
      <button *ngIf="hasActiveFilters()" class="btn-clear" (click)="clearFilters()">
        <i class="pi pi-filter-slash"></i>
        Clear
      </button>
    </div>

    <div activeFilters *ngIf="hasActiveFilters()" class="active-filters">
      <span class="active-filters-label">Active filters:</span>
      <span *ngIf="searchTerm" class="filter-chip">
        Search: "{{ searchTerm }}"
        <i class="pi pi-times" (click)="searchTerm = ''; onSearch()"></i>
      </span>
      <span *ngIf="filterStatus" class="filter-chip">
        Status: {{ filterStatus }}
        <i class="pi pi-times" (click)="filterStatus = null; onFilterChange()"></i>
      </span>
      <span *ngIf="dateRange && dateRange.length > 0" class="filter-chip">
        Date Range
        <i class="pi pi-times" (click)="dateRange = []; onFilterChange()"></i>
      </span>
    </div>
  </app-filter-bar>

  <app-goods-receipts-list
    [goodsReceipts]="goodsReceipts"
    [loading]="loading"
    [totalRecords]="totalRecords"
    [rows]="rows"
    [currentPage]="currentPage"
    [searchTerm]="searchTerm"
    [hasActiveFilters]="hasActiveFilters()"
    (pageChange)="onPageChange($event)"
    (grnDeleted)="onGoodsReceiptDeleted()">
  </app-goods-receipts-list>
</app-page-container>
