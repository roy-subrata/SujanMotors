<p-toast></p-toast>

<app-page-container>
  <app-page-header
    title="Supplier Performance"
    subtitle="Damaged/rejected rate from accepted goods receipts"
    [count]="rows.length" countLabel="suppliers" countIcon="pi pi-chart-bar">
  </app-page-header>

  <app-filter-bar>
    <div search class="filter-group search-group">
      <div class="search-input-wrapper">
        <i class="pi pi-search"></i>
        <input
          type="text"
          class="search-input"
          placeholder="Search by supplier name or code..."
          [(ngModel)]="searchTerm"
          (keyup.enter)="onSearch()" />
        <button *ngIf="searchTerm" class="search-clear" (click)="searchTerm = ''; onSearch()">
          <i class="pi pi-times"></i>
        </button>
      </div>
    </div>
  </app-filter-bar>

  <section class="table-section">
    <div class="table-container">
      <p-table [value]="rows" [paginator]="true" [rows]="pageSize" [(first)]="first"
        [loading]="loading" [rowsPerPageOptions]="[10, 20, 50]" styleClass="app-table">

        <ng-template pTemplate="header">
          <tr>
            <th>Supplier</th>
            <th>Code</th>
            <th class="text-right">GRNs</th>
            <th class="text-right">Received</th>
            <th class="text-right">Rejected</th>
            <th class="text-right">Returns</th>
            <th class="text-right">Damaged Rate</th>
          </tr>
        </ng-template>

        <ng-template pTemplate="body" let-row>
          <tr>
            <td>{{ row.supplierName }}</td>
            <td>{{ row.supplierCode }}</td>
            <td class="text-right">{{ row.grnCount }}</td>
            <td class="text-right">{{ row.totalReceivedQty }}</td>
            <td class="text-right">{{ row.totalRejectedQty }}</td>
            <td class="text-right">{{ row.returnCount }}</td>
            <td class="text-right">
              <p-tag [value]="(row.damagedRatePct | number:'1.0-2') + '%'" [severity]="rateSeverity(row.damagedRatePct)"></p-tag>
            </td>
          </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
          <tr>
            <td colspan="7" class="empty-state">
              <i class="pi pi-inbox"></i>
              <p>No accepted goods receipts found.</p>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </section>
</app-page-container>
