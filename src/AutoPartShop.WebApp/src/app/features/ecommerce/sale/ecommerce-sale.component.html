<!-- Breadcrumb -->
<div class="breadcrumb">
  <a routerLink="/shop"><i class="pi pi-home"></i> Home</a>
  <i class="pi pi-angle-right"></i>
  <span>Sale</span>
</div>

<div class="sale-container">
  <div class="sale-hero">
    <div>
      <span class="sale-badge"><i class="pi pi-bolt"></i> Flash Sale</span>
      <h1>All Sale Products</h1>
      <p>Limited-time pricing across top categories.</p>
    </div>
    <a class="btn-primary" routerLink="/shop">Continue Shopping</a>
  </div>

  <div *ngIf="loading" class="loading-state">
    <i class="pi pi-spin pi-spinner"></i>
    <span>Loading sale products...</span>
  </div>

  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <i class="pi pi-search"></i>
    <h3>No sale products found</h3>
    <p>Please check back later.</p>
    <a class="btn-primary" routerLink="/shop">Browse Products</a>
  </div>

  <ng-container *ngIf="!loading && products.length > 0">
    <!-- Toolbar -->
    <div class="sale-toolbar">
      <span class="results-count">{{ totalCount }} item{{ totalCount !== 1 ? 's' : '' }} on sale</span>
      <div class="sort-control">
        <label>Sort:</label>
        <select [(ngModel)]="sortBy" (ngModelChange)="onSortChange()">
          <option value="relevance">Relevance</option>
          <option value="price_asc">Price: Low to High</option>
          <option value="price_desc">Price: High to Low</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
    </div>

    <!-- Product grid -->
    <div class="product-grid">
      <app-product-card
        *ngFor="let item of products; trackBy: trackById"
        [product]="item"
      ></app-product-card>
    </div>

    <!-- Pagination -->
    <div class="pagination" *ngIf="totalPages > 1">
      <button class="page-btn" [disabled]="pageNumber === 1" (click)="goToPage(pageNumber - 1)">
        <i class="pi pi-angle-left"></i>
      </button>
      <button
        *ngFor="let p of pages"
        class="page-btn"
        [class.active]="p === pageNumber"
        (click)="goToPage(p)"
      >{{ p }}</button>
      <button class="page-btn" [disabled]="pageNumber === totalPages" (click)="goToPage(pageNumber + 1)">
        <i class="pi pi-angle-right"></i>
      </button>
    </div>
  </ng-container>
</div>
