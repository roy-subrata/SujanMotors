<p-table
  [value]="vehicles"
  [rows]="rows"
  [first]="(currentPage - 1) * rows"
  [totalRecords]="totalRecords"
  [loading]="loading"
  [lazy]="true"
  [paginator]="true"
  [globalFilterFields]="['make', 'model', 'year', 'engineType']"
  paginatorPosition="bottom"
  [showCurrentPageReport]="true"
  currentPageReportTemplate="Showing {first} to {last} of {totalRecords} vehicles"
  (onLazyLoad)="onPageChange($event)"
  responsiveLayout="scroll"
  [tableStyle]="{ 'min-width': '50rem' }"
  styleClass="p-datatable-striped">

  <!-- Header Template -->
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="make" style="width: 15%">
        Make <p-sortIcon field="make"></p-sortIcon>
      </th>
      <th pSortableColumn="model" style="width: 20%">
        Model <p-sortIcon field="model"></p-sortIcon>
      </th>
      <th pSortableColumn="year" style="width: 10%">
        Year <p-sortIcon field="year"></p-sortIcon>
      </th>
      <th style="width: 15%">Engine Type</th>
      <th style="width: 25%">Description</th>
      <th style="width: 10%">Status</th>
      <th style="width: 5%">Actions</th>
    </tr>
  </ng-template>

  <!-- Data Rows -->
  <ng-template pTemplate="body" let-vehicle>
    <tr>
      <td>
        <span class="font-semibold">{{ vehicle.make }}</span>
      </td>
      <td>
        <span>{{ vehicle.model }}</span>
      </td>
      <td class="text-center">
        <span>{{ vehicle.year }}</span>
      </td>
      <td>
        <span class="text-gray-600">{{ vehicle.engineType }}</span>
      </td>
      <td>
        <span class="text-sm text-gray-600">{{ vehicle.description || 'N/A' }}</span>
      </td>
      <td>
        <p-tag
          [value]="vehicle.isActive ? 'Active' : 'Inactive'"
          [severity]="getStatusSeverity(vehicle.isActive)">
        </p-tag>
      </td>
      <td>
        <div class="action-buttons">
          <button
            pButton
            pRipple
            type="button"
            icon="pi pi-ellipsis-v"
            class="p-button-text p-button-sm"
            pTooltip="Actions"
            tooltipPosition="left"
            (contextmenu)="showContextMenu($event, vehicle)"
            (click)="showContextMenu($event, vehicle)">
          </button>
        </div>
      </td>
    </tr>
  </ng-template>

  <!-- Empty Message -->
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7" class="text-center py-4">
        <i class="pi pi-inbox mr-2"></i>
        No vehicles found.
      </td>
    </tr>
  </ng-template>
</p-table>

<!-- Context Menu -->
<p-contextMenu
  #contextMenu
  [model]="contextMenuItems"
  [appendTo]="'body'">
</p-contextMenu>

<!-- Confirm Dialog -->
<p-confirmDialog></p-confirmDialog>
