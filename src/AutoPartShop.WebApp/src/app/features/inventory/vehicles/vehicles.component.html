<!-- ============================================================
     VEHICLES LIST - ENTERPRISE UI (MATCHES SALES ORDERS LAYOUT)
     ============================================================ -->

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-page-container>
  <!-- ==================== PAGE HEADER ==================== -->
  <app-page-header
    title="Vehicles"
    subtitle="Manage vehicle makes, models, and compatibility"
    [count]="totalRecords" countLabel="vehicles">
    <ng-container actions>
      <button class="btn-icon" pTooltip="Refresh" tooltipPosition="bottom" (click)="refreshData()">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button class="btn-primary" (click)="createVehicle()">
        <i class="pi pi-plus"></i>
        <span>New Vehicle</span>
      </button>
    </ng-container>
  </app-page-header>

  <!-- ==================== FILTER SECTION ==================== -->
  <section class="filter-section">
    <div class="filter-container">
      <div class="filter-group search-group">
        <div class="search-input-wrapper">
          <i class="pi pi-search"></i>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Search by make, model, year, engine..."
            (keyup.enter)="onSearch()"
            class="search-input" />
          <button *ngIf="searchTerm" class="search-clear" (click)="onSearchClear()">
            <i class="pi pi-times"></i>
          </button>
        </div>
      </div>

      <div class="filter-group filter-actions">
        <button class="btn-search" (click)="onSearch()">
          <i class="pi pi-search"></i>
          Search
        </button>
        <button *ngIf="hasActiveFilters()" class="btn-clear" (click)="clearFilters()">
          <i class="pi pi-filter-slash"></i>
          Clear
        </button>
      </div>
    </div>

    <div *ngIf="hasActiveFilters()" class="active-filters">
      <span class="active-filters-label">Active filters:</span>
      <span *ngIf="searchTerm" class="filter-chip">
        Search: "{{ searchTerm }}"
        <i class="pi pi-times" (click)="onSearchClear()"></i>
      </span>
    </div>
  </section>

  <!-- ==================== LIST SECTION ==================== -->
  <app-vehicles-list
    [vehicles]="vehicles"
    [loading]="loading"
    [totalRecords]="totalRecords"
    [rows]="rows"
    [currentPage]="currentPage"
    (viewClick)="onViewClick($event)"
    (editClick)="onEditClick($event)"
    (pageChange)="onPageChange($event)"
    (vehicleDeleted)="onVehicleDeleted()">
  </app-vehicles-list>
</app-page-container>
