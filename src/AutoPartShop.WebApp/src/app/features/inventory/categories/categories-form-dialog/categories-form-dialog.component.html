<p-toast position="top-right"></p-toast>

<!-- ==================== CREATE CATEGORY DIALOG ==================== -->
<p-dialog
    [(visible)]="displayCreateDialog"
    header="New Category"
    [modal]="true"
    [style]="{width: '600px'}"
    [breakpoints]="{'960px': '90vw', '640px': '100vw'}"
    [draggable]="false"
    [resizable]="false"
    (onShow)="onCreateDialogShow()"
    (onHide)="onCreateDialogHide()">

    <form [formGroup]="createForm" class="form-container">

        <!-- Parent Category (full width) -->
        <div class="form-group">
            <label for="c-parent" class="form-label">Parent Category</label>
            <app-lazy-autocomplete
                id="c-parent"
                formControlName="parentCategory"
                [(ngModel)]="selectedParentCategory"
                [fetchFn]="fetchParentCategories.bind(this)"
                placeholder="Search or leave empty for root category..."
                [pageSize]="20"
                [itemSize]="52"
                optionLabel="name"
                [disabled]="isCreating()"
                (onItemSelect)="onParentCategorySelect($event)"
                (onClearEvent)="onParentCategoryCleared()">
                <ng-template let-cat #item>
                    <div class="autocomplete-item">{{ cat.name }} <span class="autocomplete-code">({{ cat.code }})</span></div>
                </ng-template>
            </app-lazy-autocomplete>
            <small class="hint-message">Leave empty to create a root (top-level) category</small>
        </div>

        <!-- Row: Name + Code -->
        <div class="form-row">
            <div class="form-group">
                <label for="c-name" class="form-label"><span class="required">*</span> Name</label>
                <input type="text" pInputText id="c-name" formControlName="name"
                       placeholder="e.g. Engine Parts" class="form-input" />
                <small class="form-error" *ngIf="createForm.get('name')?.touched && createForm.get('name')?.invalid">
                    Name is required (3–100 characters)
                </small>
            </div>
            <div class="form-group">
                <label for="c-code" class="form-label"><span class="required">*</span> Code</label>
                <div class="code-input-wrapper">
                    <input type="text" pInputText id="c-code" formControlName="code"
                           placeholder="Auto-generated" class="form-input" style="text-transform:uppercase" />
                    <i *ngIf="generatingCode" class="pi pi-spin pi-spinner code-spinner"></i>
                </div>
                <small class="hint-message">Auto-generated unique identifier</small>
            </div>
        </div>

        <!-- Description (full width) -->
        <div class="form-group">
            <label for="c-description" class="form-label">Description</label>
            <textarea pInputTextarea id="c-description" formControlName="description" rows="2"
                      placeholder="Optional description" class="form-input"></textarea>
        </div>

        <!-- Row: Display Order + Active -->
        <div class="form-row">
            <div class="form-group">
                <label for="c-order" class="form-label">Display Order</label>
                <p-inputNumber id="c-order" formControlName="displayOrder"
                               [min]="0" styleClass="form-input w-full"></p-inputNumber>
                <small class="hint-message">Lower = shown first</small>
            </div>
            <div class="form-group form-checkbox-group">
                <p-checkbox formControlName="isActive" [binary]="true" inputId="c-active"></p-checkbox>
                <label for="c-active" class="form-label checkbox-label">Active</label>
            </div>
        </div>

    </form>

    <ng-template pTemplate="footer">
        <div class="dialog-footer">
            <button pButton type="button" label="Cancel" icon="pi pi-times"
                    class="p-button-text p-button-secondary"
                    [disabled]="isCreating()" (click)="onCreateDialogHide()"></button>
            <button pButton type="button" label="Create Category" icon="pi pi-check"
                    class="p-button-success" (click)="onCreateSubmit()"
                    [disabled]="isCreating()" [loading]="isCreating()"></button>
        </div>
    </ng-template>
</p-dialog>


<!-- ==================== UPDATE CATEGORY DIALOG ==================== -->
<p-dialog
    [(visible)]="displayUpdateDialog"
    [header]="'Edit: ' + (selectedCategory?.name || '')"
    [modal]="true"
    [style]="{width: '600px'}"
    [breakpoints]="{'960px': '90vw', '640px': '100vw'}"
    [draggable]="false"
    [resizable]="false"
    (onShow)="onUpdateDialogShow()"
    (onHide)="onUpdateDialogHide()">

    <form [formGroup]="updateForm" class="form-container">

        <!-- Name (full width) -->
        <div class="form-group">
            <label for="u-name" class="form-label"><span class="required">*</span> Name</label>
            <input type="text" pInputText id="u-name" formControlName="name"
                   placeholder="Category name" class="form-input" />
            <small class="form-error" *ngIf="updateForm.get('name')?.touched && updateForm.get('name')?.invalid">
                Name is required (3–100 characters)
            </small>
        </div>

        <!-- Description (full width) -->
        <div class="form-group">
            <label for="u-description" class="form-label">Description</label>
            <textarea pInputTextarea id="u-description" formControlName="description" rows="2"
                      placeholder="Optional description" class="form-input"></textarea>
        </div>

        <!-- Row: Display Order + Active -->
        <div class="form-row">
            <div class="form-group">
                <label for="u-order" class="form-label">Display Order</label>
                <p-inputNumber id="u-order" formControlName="displayOrder"
                               [min]="0" styleClass="form-input w-full"></p-inputNumber>
            </div>
            <div class="form-group form-checkbox-group">
                <p-checkbox formControlName="isActive" [binary]="true" inputId="u-active"></p-checkbox>
                <label for="u-active" class="form-label checkbox-label">Active</label>
            </div>
        </div>

    </form>

    <ng-template pTemplate="footer">
        <div class="dialog-footer">
            <button pButton type="button" label="Cancel" icon="pi pi-times"
                    class="p-button-text p-button-secondary"
                    [disabled]="isUpdating()" (click)="onUpdateDialogHide()"></button>
            <button pButton type="button" label="Save Changes" icon="pi pi-check"
                    class="p-button-info" (click)="onUpdateSubmit()"
                    [disabled]="isUpdating()" [loading]="isUpdating()"></button>
        </div>
    </ng-template>
</p-dialog>
