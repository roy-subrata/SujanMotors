<div class="brand-header">
  <div class="header-content">
    <!-- Title and Subtitle -->
    <div class="header-title-section">
      <h3 class="header-title">Categories Management</h3>
      <p class="header-subtitle">Organize and manage your product categories</p>
    </div>

    <!-- Toolbar: Search and Action Button -->
    <div class="toolbar">
      <div class="search-container">
        <i class="pi pi-search search-icon"></i>
        <input type="text" placeholder="Search by name or code..." class="search-input"
          (ngModelChange)="onSearchChange($event)" [(ngModel)]="searchQuery">
        <i *ngIf="searchQuery" class="pi pi-times clear-icon" (click)="clearSearch()">
        </i>
      </div>
      <button pButton type="button" label="New Category" icon="pi pi-plus" class="p-button-success btn-create"
        (click)="onCreateClick()">
      </button>
    </div>
  </div>
</div>
