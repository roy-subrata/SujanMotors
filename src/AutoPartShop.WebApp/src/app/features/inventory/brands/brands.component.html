<!-- ============================================================
     BRANDS LIST — standardized data-page layout
     ============================================================ -->

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-page-container>

  <!-- ==================== HEADER ==================== -->
  <app-page-header
    title="Brands"
    subtitle="Manage part brands and manufacturers"
    [breadcrumb]="[{ label: 'Inventory' }, { label: 'Brands' }]"
    [count]="totalRecords" countLabel="brands" countIcon="pi pi-tags">
    <ng-container actions>
      <button class="btn-icon" pTooltip="Refresh" tooltipPosition="bottom" (click)="refreshData()">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button class="btn-primary" (click)="createBrand()">
        <i class="pi pi-plus"></i>
        <span>New Brand</span>
      </button>
    </ng-container>
  </app-page-header>

  <!-- ==================== FILTERS ==================== -->
  <app-filter-bar>
    <div search class="filter-group search-group">
      <div class="search-input-wrapper">
        <i class="pi pi-search"></i>
        <input
          type="text"
          [(ngModel)]="searchTerm"
          placeholder="Search brands..."
          (keyup.enter)="onSearch()"
          class="search-input" />
        <button *ngIf="searchTerm" class="search-clear" (click)="clearSearchInput(); onSearch()">
          <i class="pi pi-times"></i>
        </button>
      </div>
    </div>

    <div filters class="filter-group">
      <label class="filter-label">Status</label>
      <p-select
        [options]="statusOptions"
        [(ngModel)]="filterStatus"
        placeholder="All Statuses"
        [showClear]="true"
        appendTo="body"
        styleClass="filter-dropdown">
      </p-select>
    </div>

    <div filterActions class="filter-group filter-actions">
      <button class="btn-search" (click)="onSearch()">
        <i class="pi pi-search"></i>
        Apply
      </button>
      <button *ngIf="hasActiveFilters()" class="btn-clear" (click)="clearFilters()">
        <i class="pi pi-filter-slash"></i>
        Clear
      </button>
    </div>

    <div activeFilters *ngIf="hasActiveFilters()" class="active-filters">
      <span class="active-filters-label">Active filters:</span>
      <span *ngIf="searchTerm" class="filter-chip">
        Search: "{{ searchTerm }}"
        <i class="pi pi-times" (click)="clearSearchInput(); onSearch()"></i>
      </span>
      <span *ngIf="filterStatus !== null" class="filter-chip">
        Status: {{ getStatusLabel(filterStatus) }}
        <i class="pi pi-times" (click)="filterStatus = null; onFilterChange()"></i>
      </span>
    </div>
  </app-filter-bar>

  <!-- ==================== LIST SECTION ==================== -->
  <app-brands-list
    [brands]="brands"
    [loading]="loading"
    [totalRecords]="totalRecords"
    [rows]="rows"
    [currentPage]="currentPage"
    (editBrand)="selectAndOpenUpdate($event)"
    (deleteBrand)="selectAndDelete($event)"
    (toggleStatus)="toggleBrandStatus($event)"
    (pageChange)="onPageChange($event)">
  </app-brands-list>

</app-page-container>

<!-- ==================== FORM DIALOG ==================== -->
<app-brands-form-dialog
  [displayCreateDialog]="displayCreateDialog"
  [displayUpdateDialog]="displayUpdateDialog"
  [selectedBrand]="selectedBrand"
  (displayCreateDialogChange)="onDisplayCreateDialogChange($event)"
  (displayUpdateDialogChange)="onDisplayUpdateDialogChange($event)"
  (createSuccess)="onCreateSuccess()"
  (updateSuccess)="onUpdateSuccess()">
</app-brands-form-dialog>
