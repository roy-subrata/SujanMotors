<!-- ============================================================
     UNITS - ENTERPRISE UI (MATCHES SALES ORDERS LAYOUT)
     ============================================================ -->

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-page-container>
  <!-- ==================== PAGE HEADER ==================== -->
  <app-page-header
    title="Units"
    subtitle="Manage measurement units and conversions"
    [count]="unitsTotalRecords" countLabel="units">
  </app-page-header>

  <p-tabs value="0">
    <p-tablist>
      <p-tab value="0">Units</p-tab>
      <p-tab value="1">Units Conversion</p-tab>
    </p-tablist>

    <p-tabpanels>
      <!-- Units Tab -->
      <p-tabpanel value="0" header="Units" leftIcon="pi pi-th">
        <section class="filter-section">
          <div class="filter-container">
            <div class="filter-group search-group">
              <div class="search-input-wrapper">
                <i class="pi pi-search"></i>
                <input
                  type="text"
                  [(ngModel)]="searchTerm"
                  placeholder="Search by name, code, or symbol..."
                  (keyup.enter)="onSearch(searchTerm)"
                  class="search-input" />
                <button *ngIf="searchTerm" class="search-clear" (click)="clearUnitsSearch()">
                  <i class="pi pi-times"></i>
                </button>
              </div>
            </div>

            <div class="filter-group filter-actions">
              <button class="btn-search" (click)="onSearch(searchTerm)">
                <i class="pi pi-search"></i>
                Search
              </button>
              <button *ngIf="hasUnitsFilters()" class="btn-clear" (click)="clearUnitsSearch()">
                <i class="pi pi-filter-slash"></i>
                Clear
              </button>
              <button class="btn-primary" (click)="onNewUnitClick()">
                <i class="pi pi-plus"></i>
                <span>New Unit</span>
              </button>
            </div>
          </div>

          <div *ngIf="hasUnitsFilters()" class="active-filters">
            <span class="active-filters-label">Active filters:</span>
            <span class="filter-chip">
              Search: "{{ searchTerm }}"
              <i class="pi pi-times" (click)="clearUnitsSearch()"></i>
            </span>
          </div>
        </section>

        <app-units-list
          (editUnit)="selectAndOpenUpdate($event)"
          (deleteUnit)="selectAndDelete($event)"
          (toggleStatus)="selectAndToggleStatus($event)">
        </app-units-list>

        <app-units-form-dialog
          [displayCreateDialog]="displayCreateDialog"
          [displayUpdateDialog]="displayUpdateDialog"
          [selectedUnit]="selectedUnit"
          (displayCreateDialogChange)="onDisplayCreateDialogChange($event)"
          (displayUpdateDialogChange)="onDisplayUpdateDialogChange($event)"
          (createSuccess)="onCreateSuccess()"
          (updateSuccess)="onUpdateSuccess()">
        </app-units-form-dialog>
      </p-tabpanel>

      <!-- Conversions Tab -->
      <p-tabpanel value="1" header="Conversions" leftIcon="pi pi-arrows-h">
        <section class="filter-section">
          <div class="filter-container">
            <div class="filter-group search-group">
              <div class="search-input-wrapper">
                <i class="pi pi-search"></i>
                <input
                  type="text"
                  [(ngModel)]="conversionSearchTerm"
                  placeholder="Search by unit names or codes..."
                  (keyup.enter)="onConversionSearch(conversionSearchTerm)"
                  class="search-input" />
                <button *ngIf="conversionSearchTerm" class="search-clear" (click)="clearConversionSearch()">
                  <i class="pi pi-times"></i>
                </button>
              </div>
            </div>

            <div class="filter-group filter-actions">
              <button class="btn-search" (click)="onConversionSearch(conversionSearchTerm)">
                <i class="pi pi-search"></i>
                Search
              </button>
              <button *ngIf="hasConversionFilters()" class="btn-clear" (click)="clearConversionSearch()">
                <i class="pi pi-filter-slash"></i>
                Clear
              </button>
              <button class="btn-primary" (click)="onNewConversionClick()">
                <i class="pi pi-plus"></i>
                <span>New Conversion</span>
              </button>
            </div>
          </div>

          <div *ngIf="hasConversionFilters()" class="active-filters">
            <span class="active-filters-label">Active filters:</span>
            <span class="filter-chip">
              Search: "{{ conversionSearchTerm }}"
              <i class="pi pi-times" (click)="clearConversionSearch()"></i>
            </span>
          </div>
        </section>

        <app-conversions-list
          (editConversion)="selectAndOpenConversionUpdate($event)"
          (deleteConversion)="selectAndDeleteConversion($event)"
          (toggleStatus)="selectAndToggleConversionStatus($event)">
        </app-conversions-list>

        <app-conversions-form-dialog
          [displayCreateDialog]="displayConversionCreateDialog"
          [displayUpdateDialog]="displayConversionUpdateDialog"
          [selectedConversion]="selectedConversion"
          [units]="units"
          (displayCreateDialogChange)="onDisplayConversionCreateDialogChange($event)"
          (displayUpdateDialogChange)="onDisplayConversionUpdateDialogChange($event)"
          (createSuccess)="onConversionCreateSuccess()"
          (updateSuccess)="onConversionUpdateSuccess()">
        </app-conversions-form-dialog>
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</app-page-container>
