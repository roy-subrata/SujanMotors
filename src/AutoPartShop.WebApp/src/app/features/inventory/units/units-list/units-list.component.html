<div class="units-list-container">



  <p-table [value]="units" [rows]="pageSize" [totalRecords]="totalRecords" [loading]="loading" [paginator]="true"
    [rowsPerPageOptions]="[5, 10, 20, 50]" [showCurrentPageReport]="true" [lazy]="true"
    [globalFilterFields]="['name', 'code', 'symbol']"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords} units" (onLazyLoad)="onPageChange($event)"
    styleClass="p-datatable-striped p-datatable-sm" responsiveLayout="scroll">
    <ng-template #header>
      <tr>
        <th>Name</th>
        <th>Code</th>
        <th>Symbol</th>
        <th>Description</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-unit>
      <tr>
        <td>{{ unit.name }}</td>
        <td>{{ unit.code }}</td>
        <td>{{ unit.symbol }}</td>
        <td>{{ unit.description }}</td>
        <td>{{ unit.isActive }}</td>
        <td>
          <div class="flex gap-2 justify-center">
            <!-- Edit Button -->
            <button pButton type="button" icon="pi pi-pencil"
              class="p-button-rounded p-button-info p-button-text p-button-sm" pTooltip="Edit" tooltipPosition="top"
              (click)="onEdit(unit)"></button>

            <!-- Delete Button -->
            <button pButton type="button" icon="pi pi-trash"
              class="p-button-rounded p-button-danger p-button-text p-button-sm" pTooltip="Delete" tooltipPosition="top"
              (click)="onDelete(unit)"></button>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Empty State -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center py-8">
          <div class="flex flex-col items-center justify-center">
            <i class="pi pi-inbox text-4xl text-gray-400 mb-4"></i>
            <p class="text-gray-500 text-lg">No units found</p>
            <p class="text-gray-400 text-sm">Create a new unit to get started</p>
          </div>
        </td>
      </tr>
    </ng-template>

    <!-- Loading Template -->
    <ng-template pTemplate="loadingbody">
      <tr>
        <td colspan="7" class="text-center py-8">
          <i class="pi pi-spin pi-spinner text-4xl text-blue-500"></i>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
