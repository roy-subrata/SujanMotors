<div class="barcode-dialog">
  <p-toast position="top-right"></p-toast>

  <!-- Main Layout: Controls + Label Preview side by side -->
  <div class="barcode-main-layout">
    <!-- Left: Controls -->
    <div class="barcode-controls-panel">
      <h4 class="panel-title"><i class="pi pi-cog"></i> Settings</h4>

      <!-- Label Style -->
      <div class="field">
        <label for="labelLayout">Label Style</label>
        <p-select id="labelLayout"
          [(ngModel)]="selectedLayout"
          [options]="layoutOptions"
          optionLabel="label"
          optionValue="value"
          (onChange)="onLayoutChange($event.value)"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Combo Design (Spotlight / Detailed) -->
      <div class="field" *ngIf="selectedLayout === 'combo'">
        <label for="comboDesign">Design</label>
        <p-select id="comboDesign"
          [(ngModel)]="selectedComboDesign"
          [options]="comboDesignOptions"
          optionLabel="label"
          optionValue="value"
          (onChange)="onComboDesignChange()"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Label Size -->
      <div class="field">
        <label for="barcodeSize">Label Size</label>
        <p-select id="barcodeSize"
          [(ngModel)]="selectedSize"
          [options]="barcodeSizeOptions"
          optionLabel="label"
          optionValue="value"
          (onChange)="onSizeChange($event.value)"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Custom Size Controls -->
      <div class="field-row" *ngIf="selectedSize === 'custom'">
        <div class="field compact">
          <label>Width (mm)</label>
          <input pInputText type="number"
            [(ngModel)]="customWidthMm"
            (change)="onCustomSizeChange()"
            min="15" max="150" step="1"
            class="w-full">
        </div>
        <div class="field compact">
          <label>Height (mm)</label>
          <input pInputText type="number"
            [(ngModel)]="customHeightMm"
            (change)="onCustomSizeChange()"
            min="10" max="150" step="1"
            class="w-full">
        </div>
      </div>

      <!-- Barcode Type -->
      <div class="field">
        <label for="barcodeType">Barcode Type</label>
        <p-select id="barcodeType"
          [(ngModel)]="selectedBarcodeType"
          [options]="barcodeTypes"
          optionLabel="label"
          optionValue="value"
          (onChange)="generateBarcode($event.value)"
          [disabled]="isGenerating"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Barcode Value Source -->
      <div class="field">
        <label for="valueSource">Value Source</label>
        <p-select id="valueSource"
          [(ngModel)]="selectedValueSource"
          [options]="valueSourceOptions"
          optionLabel="label"
          optionValue="value"
          (onChange)="onValueSourceChange($event.value)"
          styleClass="w-full">
        </p-select>
      </div>

      <!-- Custom Value -->
      <div class="field" *ngIf="selectedValueSource === 'custom'">
        <label for="customVal">Custom Value</label>
        <input pInputText id="customVal"
          [(ngModel)]="customValue"
          (input)="onValueSourceChange('custom')"
          class="w-full"
          placeholder="Enter custom value">
      </div>

      <!-- Quantity -->
      <div class="field">
        <label for="qty">Print Quantity</label>
        <div class="qty-input-group">
          <button pButton icon="pi pi-minus" class="p-button-sm p-button-outlined"
            (click)="quantity = quantity > 1 ? quantity - 1 : 1"
            [disabled]="quantity <= 1"></button>
          <input pInputText id="qty" type="number"
            [(ngModel)]="quantity"
            (change)="validateQuantity()"
            min="1" [max]="maxQuantity"
            class="qty-input">
          <button pButton icon="pi pi-plus" class="p-button-sm p-button-outlined"
            (click)="quantity = quantity < maxQuantity ? quantity + 1 : maxQuantity"
            [disabled]="quantity >= maxQuantity"></button>
        </div>
        <small class="field-hint">Max {{ maxQuantity }} per batch</small>
      </div>

      <!-- Company Name -->
      <div class="field">
        <label for="company">Company Name</label>
        <input pInputText id="company"
          [(ngModel)]="companyName"
          (input)="onFieldChange()"
          class="w-full"
          placeholder="Company / shop name">
      </div>

      <!-- Label Fields Toggle -->
      <h4 class="panel-title" style="margin-top: 0.5rem;"><i class="pi pi-tag"></i> Label Fields</h4>
      <div class="label-fields-list">
        <div class="label-field-toggle" *ngFor="let field of labelFields">
          <p-checkbox
            [(ngModel)]="field.visible"
            [binary]="true"
            [inputId]="'lf_' + field.key"
            (onChange)="onFieldChange()">
          </p-checkbox>
          <label [for]="'lf_' + field.key" class="toggle-label">{{ field.label }}</label>
          <input pInputText
            [(ngModel)]="field.value"
            (input)="onFieldChange()"
            class="toggle-value-input"
            [placeholder]="field.label">
        </div>
      </div>
    </div>

    <!-- Right: Label Preview -->
    <div class="barcode-preview-panel">
      <h4 class="panel-title"><i class="pi pi-eye"></i> Label Preview</h4>

      <!-- Label rendered from the single source of truth (matches print) -->
      <div class="label-preview-wrapper">
        <div class="label-preview-stage">
          <div class="label-scale-box"
            *ngIf="labelHtmlSafe && !validationMessage"
            [style.width.px]="previewBox.w"
            [style.height.px]="previewBox.h">
            <div class="label-scale-inner"
              [style.transform]="'scale(' + previewScale + ')'"
              [innerHTML]="labelHtmlSafe"></div>
          </div>

          <div class="preview-error" *ngIf="validationMessage && !isGenerating">
            <i class="pi pi-exclamation-triangle"></i>
            <span>{{ validationMessage }}</span>
          </div>

          <div class="preview-loading" *ngIf="isGenerating">
            <i class="pi pi-spin pi-spinner"></i>
          </div>
        </div>
        <small class="preview-dims">{{ widthMm }} × {{ heightMm }} mm</small>
      </div>

      <!-- Barcode Value Display -->
      <div class="value-display">
        <code>{{ barcodeValue }}</code>
        <button pButton icon="pi pi-copy" class="p-button-sm p-button-text p-button-rounded"
          (click)="copyBarcodeValue()" pTooltip="Copy value" tooltipPosition="top"></button>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <div class="action-bar-left">
      <button pButton icon="pi pi-download" label="PNG"
        class="p-button-sm p-button-outlined"
        (click)="downloadBarcode()"
        [loading]="isDownloading"
        [disabled]="isDownloading || isGenerating"
        pTooltip="Download barcode as PNG image"></button>
      <button pButton icon="pi pi-download" label="SVG"
        class="p-button-sm p-button-outlined"
        (click)="downloadBarcodeSVG()"
        [disabled]="isGenerating || !barcodeSvg"
        pTooltip="Download barcode as SVG"></button>
    </div>
    <div class="action-bar-right">
      <button pButton icon="pi pi-print"
        [label]="quantity > 1 ? 'Print Labels (' + quantity + ')' : 'Print Label'"
        class="p-button-sm"
        (click)="printBarcode()"
        [disabled]="isGenerating || !!validationMessage"></button>
      <button pButton icon="pi pi-times" label="Close"
        class="p-button-sm p-button-text"
        (click)="closeDialog()"></button>
    </div>
  </div>
</div>
