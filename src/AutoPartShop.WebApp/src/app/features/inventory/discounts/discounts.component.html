<!-- ============================================================
     DISCOUNTS LIST - ENTERPRISE UI
     ============================================================ -->

<p-toast position="top-right"></p-toast>
<p-confirmDialog></p-confirmDialog>

<app-page-container>
  <!-- ==================== PAGE HEADER ==================== -->
  <app-page-header
    title="Discounts"
    subtitle="Manage discount rules and promotions"
    [count]="totalRecords" countLabel="discounts">
    <ng-container actions>
      <button class="btn-icon" pTooltip="Refresh" tooltipPosition="bottom" (click)="refreshData()">
        <i class="pi pi-refresh" [class.pi-spin]="loading"></i>
      </button>
      <button class="btn-primary" (click)="createDiscount()">
        <i class="pi pi-plus"></i>
        <span>New Discount</span>
      </button>
    </ng-container>
  </app-page-header>

  <!-- ==================== FILTER SECTION ==================== -->
  <section class="filter-section">
    <div class="filter-container">
      <!-- Search Input -->
      <div class="filter-group search-group">
        <div class="search-input-wrapper">
          <i class="pi pi-search"></i>
          <input
            type="text"
            [(ngModel)]="searchTerm"
            placeholder="Search discounts..."
            (keyup.enter)="onSearch()"
            class="search-input" />
          <button *ngIf="searchTerm" class="search-clear" (click)="clearSearchInput(); onSearch()">
            <i class="pi pi-times"></i>
          </button>
        </div>
      </div>

      <!-- Scope Filter -->
      <div class="filter-group">
        <p-select
          [options]="scopeOptions"
          [(ngModel)]="filterScope"
          placeholder="All Scopes"
          [showClear]="true"
          appendTo="body"
          (onChange)="onFilterChange()"
          styleClass="filter-dropdown">
        </p-select>
      </div>

      <!-- Status Filter -->
      <div class="filter-group">
        <p-select
          [options]="statusOptions"
          [(ngModel)]="filterStatus"
          placeholder="All Statuses"
          [showClear]="true"
          appendTo="body"
          (onChange)="onFilterChange()"
          styleClass="filter-dropdown">
        </p-select>
      </div>

      <!-- Filter Actions -->
      <div class="filter-group filter-actions">
        <button class="btn-search" (click)="onSearch()">
          <i class="pi pi-search"></i>
          Apply
        </button>
        <button *ngIf="hasActiveFilters()" class="btn-clear" (click)="clearFilters()">
          <i class="pi pi-filter-slash"></i>
          Clear
        </button>
      </div>
    </div>

    <!-- Active Filters Display -->
    <div *ngIf="hasActiveFilters()" class="active-filters">
      <span class="active-filters-label">Active filters:</span>
      <span *ngIf="searchTerm" class="filter-chip">
        Search: "{{ searchTerm }}"
        <i class="pi pi-times" (click)="clearSearchInput(); onSearch()"></i>
      </span>
      <span *ngIf="filterScope !== null" class="filter-chip">
        Scope: {{ getScopeLabel(filterScope) }}
        <i class="pi pi-times" (click)="filterScope = null; onFilterChange()"></i>
      </span>
      <span *ngIf="filterStatus !== null" class="filter-chip">
        Status: {{ getStatusLabel(filterStatus) }}
        <i class="pi pi-times" (click)="filterStatus = null; onFilterChange()"></i>
      </span>
    </div>
  </section>

  <!-- ==================== LIST SECTION ==================== -->
  <app-discounts-list
    [discounts]="filteredDiscounts"
    [loading]="loading"
    [totalRecords]="totalRecords"
    [rows]="rows"
    [currentPage]="currentPage"
    (editDiscount)="selectAndOpenUpdate($event)"
    (deleteDiscount)="selectAndDelete($event)"
    (toggleActive)="selectAndToggleActive($event)"
    (pageChange)="onPageChange($event)">
  </app-discounts-list>
</app-page-container>

<!-- ==================== FORM DIALOG ==================== -->
<app-discount-form-dialog
  [displayCreateDialog]="displayCreateDialog"
  [displayUpdateDialog]="displayUpdateDialog"
  [selectedDiscount]="selectedDiscount"
  (displayCreateDialogChange)="onDisplayCreateDialogChange($event)"
  (displayUpdateDialogChange)="onDisplayUpdateDialogChange($event)"
  (createSuccess)="onCreateSuccess()"
  (updateSuccess)="onUpdateSuccess()">
</app-discount-form-dialog>
