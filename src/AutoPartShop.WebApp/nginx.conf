# ---------------------------------------------------------------------------
# HTTP (port 80)
#
# In DEVELOPMENT this serves the app directly.
# In PRODUCTION this container MUST sit behind TLS. You have two options:
#   1. Terminate TLS at an upstream load balancer / reverse proxy (Azure App
#      Gateway, Cloudflare, AWS ALB, etc.) and forward plain HTTP to :80 here.
#   2. Terminate TLS in THIS container — uncomment the `443` server block below,
#      mount real certificates, and switch this `:80` block to a redirect (see
#      the commented redirect line). Do NOT leave the API reachable over plain
#      HTTP: JWTs are bearer tokens and travel in the clear without TLS.
#
# The API runs with RequireHttpsMetadata=false and HTTPS redirect disabled, so
# it is only safe behind one of the two TLS arrangements above.
# See deployment/README.md ("TLS / HTTPS") for the full checklist.
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name localhost;

    # When TLS is terminated in this container (option 2), replace the body of
    # this block with a permanent redirect so nothing is served over plain HTTP:
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://autopartshop.api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    location /hubs {
        proxy_pass http://autopartshop.api:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ---------------------------------------------------------------------------
# HTTPS (port 443) — option 2: terminate TLS in this container.
#
# To enable:
#   1. Mount certs into the container, e.g. in docker-compose.prod.yml:
#        volumes:
#          - ./certs/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
#          - ./certs/privkey.pem:/etc/nginx/certs/privkey.pem:ro
#        ports:
#          - "443:443"
#          - "80:80"
#   2. Uncomment this block.
#   3. Change the `:80` block above to the `return 301 https://...` redirect.
