<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;border-bottom:3px solid #1c1917;padding-bottom:14px;font-family:'IBM Plex Sans',Helvetica,Arial,sans-serif">
  <div style="display:flex;gap:12px;align-items:flex-start">
    <div style="width:46px;height:46px;background:{{accent}};color:#ffffff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:19px;letter-spacing:0.5px;flex-shrink:0">SM</div>
    <div>
      <div style="font-size:19px;font-weight:700;letter-spacing:2px;color:#1c1917;line-height:1.1">SUJAN MOTORS</div>
      <div style="font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:{{accent}};margin-top:2px">Genuine Auto Parts &amp; Accessories</div>
      <div style="font-size:9.5px;color:#57534e;line-height:1.55;margin-top:5px">137/B Bangla Motor Road, Dhaka 1000, Bangladesh<br>+880 1712-456 890 &nbsp;·&nbsp; sales@sujanmotors.com.bd<br>BIN: 004512347-0101 &nbsp;·&nbsp; VAT Reg: DHK-88231</div>
    </div>
  </div>
  <div style="text-align:right;flex-shrink:0">
    <div style="font-size:23px;font-weight:700;letter-spacing:3px;color:{{accent}};text-transform:uppercase;line-height:1.1">{{title}}</div>
    <div style="margin-top:10px;display:grid;grid-template-columns:auto auto;gap:3px 14px;justify-content:end;font-size:10.5px;color:#1c1917">
      <div style="color:#78716c;white-space:nowrap">No.</div><div style="font-family:'IBM Plex Mono',monospace;font-weight:600">{{num}}</div>
      <div style="color:#78716c;white-space:nowrap">Date</div><div style="font-family:'IBM Plex Mono',monospace">{{date}}</div>
      <sc-if value="{{extraVal}}" hint-placeholder-val="{{false}}">
        <div style="color:#78716c;white-space:nowrap">{{extraLabel}}</div><div style="font-family:'IBM Plex Mono',monospace">{{extraVal}}</div>
      </sc-if>
      <sc-if value="{{extra2Val}}" hint-placeholder-val="{{false}}">
        <div style="color:#78716c;white-space:nowrap">{{extra2Label}}</div><div style="font-family:'IBM Plex Mono',monospace">{{extra2Val}}</div>
      </sc-if>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:150},&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Tax Invoice&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;num&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;INV-2026-0847&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;date&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;16 Jul 2026&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;extraLabel&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;extraVal&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;extra2Label&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;extra2Val&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:null,&quot;default&quot;:&quot;#B0392E&quot;,&quot;tsType&quot;:&quot;string&quot;}}"></script>
</body>
</html>
