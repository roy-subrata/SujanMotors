<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:flex-end;background:#ffffff;border-top:1px solid #e6e8ec;padding:6px 8px 8px;font-family:'Instrument Sans',system-ui,sans-serif;flex-shrink:0">
  <sc-for list="{{ tabs }}" as="tb" hint-placeholder-count="5">
    <sc-if value="{{ tb.isPos }}" hint-placeholder-val="{{ false }}">
      <div style="flex:1;display:flex;justify-content:center">
        <div style="width:48px;height:48px;margin-top:-22px;border-radius:16px;background:#0f172a;color:#fff;display:grid;place-items:center;font-size:21px;box-shadow:0 6px 18px rgba(15,23,42,.35);cursor:pointer;border:3px solid #ffffff">＋</div>
      </div>
    </sc-if>
    <sc-if value="{{ tb.isTab }}" hint-placeholder-val="{{ true }}">
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer">
        <span style="font-size:17px;opacity:{{ tb.iconOpacity }}">{{ tb.icon }}</span>
        <span style="font-size:10.5px;font-weight:{{ tb.weight }};color:{{ tb.color }}">{{ tb.label }}</span>
      </div>
    </sc-if>
  </sc-for>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;412px&quot;,&quot;height&quot;:&quot;64px&quot;},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Home&quot;,&quot;Products&quot;,&quot;Customers&quot;,&quot;Sales&quot;],&quot;default&quot;:&quot;Home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? 'Home';
    const mk = (label, icon) => ({
      isTab: true, isPos: false, label, icon,
      weight: label === active ? 700 : 500,
      color: label === active ? '#0f172a' : '#8a93a2',
      iconOpacity: label === active ? 1 : 0.55,
    });
    return {
      tabs: [
        mk('Home', '◧'),
        mk('Products', '▦'),
        { isPos: true, isTab: false },
        mk('Customers', '◔'),
        mk('Sales', '🧾'),
      ],
    };
  }
}
</script>
</body>
</html>
