# TEST / STAGING — local or CI pipeline.
# docker compose -f docker-compose.test.yml up --build

services:
  autopartshop.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autopartshop.db.test
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    volumes:
      - autopart_mssql_test_data:/var/opt/mssql   # isolated from dev data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  autopartshop.api:
    build:
      context: ..
      dockerfile: src/AutoPartShop.Api/Dockerfile
    image: smapi:test
    container_name: autopartshop.api.test
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__AutoPartDb=Server=autopartshop.db.test,1433;Database=AutoPartShopDb_Test;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - JwtSettings__SecretKey=YourSuperSecretKeyForJWTTokenGenerationMustBe32CharsLong!@#
      - JwtSettings__Issuer=AutoPartShopAPI
      - JwtSettings__Audience=AutoPartShopClient
      - JwtSettings__ExpiryInMinutes=60
      - JwtSettings__RefreshTokenExpiryInDays=7
    ports:
      - "5293:8080"           # different port — run alongside dev if needed
    depends_on:
      autopartshop.db:
        condition: service_healthy
    restart: unless-stopped

  autopartshop.web:
    build:
      context: ../src/AutoPartShop.WebApp
      dockerfile: dockerfile
      args:
        ENV_NAME: development  # source maps on for debugging test failures
    image: smweb:test
    container_name: autopartshop.web.test
    ports:
      - "4201:80"             # different port — run alongside dev if needed
    depends_on:
      - autopartshop.api
    restart: unless-stopped

volumes:
  autopart_mssql_test_data:
