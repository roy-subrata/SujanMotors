# TEST / STAGING â€” local or CI pipeline.
# docker compose -f docker-compose.test.yml up --build
#
# Secrets are read from .env (see .env.example).
# Uses isolated volumes so test data never touches dev or prod data.

services:
  autopartshop.db:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: autopartshop.db.test
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${DB_PASSWORD:-YourStrong!Passw0rd}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"           # different port â€” run alongside dev if needed
    volumes:
      - autopart_mssql_test_data:/var/opt/mssql   # isolated from dev data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${DB_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  autopartshop.api:
    build:
      context: ..
      dockerfile: src/AutoPartShop.Api/Dockerfile
    image: smapi:test
    container_name: autopartshop.api.test
    environment:
      - ASPNETCORE_ENVIRONMENT=Staging
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__AutoPartDb=Server=autopartshop.db.test,1433;Database=${DB_NAME:-AutoPartShopDb_Test};User=sa;Password=${DB_PASSWORD:-YourStrong!Passw0rd};TrustServerCertificate=True;
      - JwtSettings__SecretKey=${JWT_SECRET:-YourSuperSecretKeyForJWTTokenGenerationMustBe32CharsLong!@#}
      - JwtSettings__Issuer=AutoPartShopAPI
      - JwtSettings__Audience=AutoPartShopClient
      - JwtSettings__ExpiryInMinutes=${JWT_EXPIRY_MINUTES:-60}
      - JwtSettings__RefreshTokenExpiryInDays=${JWT_REFRESH_DAYS:-7}
      - Twilio__AccountSid=${TWILIO_ACCOUNT_SID:-}
      - Twilio__AuthToken=${TWILIO_AUTH_TOKEN:-}
      - Twilio__SmsMsgServiceSid=${TWILIO_SMS_SID:-}
      - Twilio__WhatsAppMsgServiceSid=${TWILIO_WHATSAPP_SID:-}
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-}
      - Smtp__FromName=${SMTP_FROM_NAME:-SujanMotors}
      - Sms__ApiKey=${SMS_API_KEY:-}
    ports:
      - "5293:8080"           # different port â€” run alongside dev if needed
    depends_on:
      autopartshop.db:
        condition: service_healthy
    restart: unless-stopped

  autopartshop.web:
    build:
      context: ../src/AutoPartShop.WebApp
      dockerfile: dockerfile
      args:
        ENV_NAME: staging      # staging environment file, source maps on for debugging
    image: smweb:test
    container_name: autopartshop.web.test
    ports:
      - "4201:80"             # different port â€” run alongside dev if needed
    depends_on:
      - autopartshop.api
    restart: unless-stopped

volumes:
  autopart_mssql_test_data:
