services:
  autopartshop.db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: autopartshop.db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - autopart_mssql_data:/var/opt/mssql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  autopartshop.api:
    build:
      context: ..
      dockerfile: src/AutoPartShop.Api/Dockerfile
    image: smapi:local
    container_name: autopartshop.api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__AutoPartDb=Server=autopartshop.db,1433;Database=AutoPartShopDb;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;
      - JwtSettings__SecretKey=YourSuperSecretKeyForJWTTokenGenerationMustBe32CharsLong!@#
      - JwtSettings__Issuer=AutoPartShopAPI
      - JwtSettings__Audience=AutoPartShopClient
      - JwtSettings__ExpiryInMinutes=60
      - JwtSettings__RefreshTokenExpiryInDays=7
      - Twilio__AccountSid=${TWILIO_ACCOUNT_SID:-}
      - Twilio__AuthToken=${TWILIO_AUTH_TOKEN:-}
      - Twilio__SmsMsgServiceSid=${TWILIO_SMS_SID:-}
      - Twilio__WhatsAppMsgServiceSid=${TWILIO_WHATSAPP_SID:-}
      - Smtp__Host=${SMTP_HOST:-}
      - Smtp__Port=${SMTP_PORT:-587}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      - Smtp__FromEmail=${SMTP_FROM_EMAIL:-}
      - Smtp__FromName=SujanMotors
    ports:
      - "5292:8080"
    depends_on:
      autopartshop.db:
        condition: service_healthy
    restart: unless-stopped

  autopartshop.web:
    build:
      context: ../src/AutoPartShop.WebApp
      dockerfile: dockerfile
      args:
        ENV_NAME: production
    image: smweb:local
    container_name: autopartshop.web
    ports:
      - "4200:80"
    depends_on:
      - autopartshop.api
    restart: unless-stopped

