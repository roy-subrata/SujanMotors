name: Build Android APK

# Builds a release APK from the Flutter mobile app.
#
# Triggers:
#   • push to main that touches mobile/ — produces a production APK
#   • push to develop that touches mobile/ — produces a test/staging APK
#   • tag  mobile-v*                   — additionally creates a GitHub Release
#   • workflow_dispatch                — manual one-off build
#
# Signing (optional):
#   Add these four repo secrets to enable proper release signing.
#   Without them the build falls back to debug keys and still succeeds.
#
#   KEYSTORE_FILE_BASE64  base64-encoded .jks file
#   STORE_PASSWORD        keystore store password
#   KEY_ALIAS             key alias (e.g. "upload")
#   KEY_PASSWORD          key password
#
# API URL:
#   Automatically selected based on branch:
#     main     → config/prod.json  (production Azure App Service)
#     develop  → config/test.json  (staging Azure App Service)
#     other    → config/dev.json   (local development)

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-apk.yml'
    tags:
      - 'mobile-v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Select environment config
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref_type }}" = "tag" ]; then
            echo "config_file=prod.json" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "config_file=test.json" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          else
            echo "config_file=dev.json" >> "$GITHUB_OUTPUT"
            echo "env_name=development" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode keystore
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_FILE_BASE64" ]; then
            echo "$KEYSTORE_FILE_BASE64" | base64 -d > android/app/upload-keystore.jks
          fi

      - name: Build release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define-from-file=config/${{ steps.env.outputs.config_file }} \
            --build-number=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sujanmotors-${{ steps.env.outputs.env_name }}-${{ github.run_number }}.apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/mobile-v')
        uses: softprops/action-gh-release@v2
        with:
          name: SujanMotors Mobile ${{ github.ref_name }}
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: false
          body: |
            APK build #${{ github.run_number }} from tag `${{ github.ref_name }}`.

            **Environment**: ${{ steps.env.outputs.env_name }}

            **Install**: download `app-release.apk`, enable "Install from unknown sources" on the device, then open the file.
