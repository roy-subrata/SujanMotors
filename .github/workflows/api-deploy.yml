name: Deploy API to Azure App Service

# Builds the .NET 10 API image, pushes it to Docker Hub (docker.io),
# then points the Azure App Service for Containers at the new tag.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#       - app registration with an OIDC federated credential for this repo;
#         role: Contributor (or Website Contributor) on the Web App's resource group.
#   DOCKERHUB_USERNAME
#       - your Docker Hub username/namespace (e.g. subrata23).
#   DOCKERHUB_TOKEN
#       - a Docker Hub access token (Account Settings → Security → New Access Token).
#         Used both to push the image here AND by App Service to pull it.
#
# Edit WEBAPP_NAME / RESOURCE_GROUP / IMAGE to match what you provision (see deployment/README.md).

on:
  push:
    branches: [main]
    paths:
      - 'src/AutoPartShop.Api/**'
      - 'src/AutoPartShop.Application/**'
      - 'src/AutoPartShop.Domain/**'
      - 'src/AutoPartShop.Infrastructure/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # azure/login OIDC

env:
  IMAGE: subrata23/autopartshop-api              # must be lowercase
  WEBAPP_NAME: sujanmotors-api                   # App Service (Web App for Containers) name
  RESOURCE_GROUP: sujanmotors-rg                 # resource group holding the Web App

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build context is the repo root because the Dockerfile COPYs src/AutoPartShop.*/...
      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/AutoPartShop.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Point Web App at the new image
        run: |
          az webapp config container set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "${{ env.IMAGE }}:${{ github.sha }}" \
            --container-registry-url "https://index.docker.io/v1/" \
            --container-registry-user "${{ secrets.DOCKERHUB_USERNAME }}" \
            --container-registry-password "${{ secrets.DOCKERHUB_TOKEN }}"
          az webapp restart --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP"
