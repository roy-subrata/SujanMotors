name: Deploy API to Test Azure App Service

# Builds the .NET 10 API image, pushes it to Docker Hub,
# then points the TEST Azure App Service at the new tag.
#
# Triggered on push to `develop` (staging/test deployments).
# Production deployment is handled by api-deploy.yml on `main`.
#
# Required repo secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
#
# Required repo variables (Settings → Secrets and variables → Actions → Variables):
#   TEST_WEBAPP_NAME      — test App Service name (e.g. sujanmotors-api-test)
#   TEST_RESOURCE_GROUP   — resource group holding the test App Service

on:
  push:
    branches: [develop]
    paths:
      - 'src/AutoPartShop.Api/**'
      - 'src/AutoPartShop.Application/**'
      - 'src/AutoPartShop.Domain/**'
      - 'src/AutoPartShop.Infrastructure/**'
      - '.github/workflows/api-deploy-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # azure/login OIDC

env:
  IMAGE: subrata23/autopartshop-api
  WEBAPP_NAME: ${{ vars.TEST_WEBAPP_NAME || 'sujanmotors-api-test' }}
  RESOURCE_GROUP: ${{ vars.TEST_RESOURCE_GROUP || 'sujanmotors-rg' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image (test tag)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/AutoPartShop.Api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:test-${{ github.sha }}
            ${{ env.IMAGE }}:test-latest

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Point test Web App at the new image
        run: |
          az webapp config container set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --container-image-name "${{ env.IMAGE }}:test-${{ github.sha }}" \
            --container-registry-url "https://index.docker.io/v1/" \
            --container-registry-user "${{ secrets.DOCKERHUB_USERNAME }}" \
            --container-registry-password "${{ secrets.DOCKERHUB_TOKEN }}"
          az webapp restart --name "$WEBAPP_NAME" --resource-group "$RESOURCE_GROUP"
