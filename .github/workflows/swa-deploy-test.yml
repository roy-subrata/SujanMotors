name: Deploy Frontend to Test Azure Static Web Apps

# Builds the Angular app with the staging configuration and deploys
# to the TEST Azure Static Web Apps environment.
#
# Triggered on push to `develop` (staging/test deployments).
# Production deployment is handled by swa-deploy.yml on `main`.
#
# Required repo secrets:
#   AZURE_STATIC_WEB_APPS_API_TOKEN_TEST — deployment token for the TEST SWA
#
# NOTE: The staging API URL is baked in at build time from environment.staging.ts.

on:
  push:
    branches: [develop]
    paths:
      - 'src/AutoPartShop.WebApp/**'
      - '.github/workflows/swa-deploy-test.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/AutoPartShop.WebApp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        run: npx ng build --configuration staging

      - name: Deploy to Static Web Apps (test)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_TEST }}
          action: upload
          app_location: src/AutoPartShop.WebApp/dist/smauto/browser
          output_location: ''
          skip_app_build: true
